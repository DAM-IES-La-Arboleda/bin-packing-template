name: Autograding
on: [push]
jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout alumno
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compilar
        run: javac -d out src/core/*.java src/solution/*.java

      - name: Descargar Tests Privados
        env:
          MY_TOKEN: ${{ secrets.MY_PRIVATE_TOKEN }}
        run: |
          git clone https://x-access-token:${MY_TOKEN}@github.com/DAM-IES-La-Arboleda/bin-packing-private-tests.git secretos

      - name: Ejecutar Evaluador
        id: evaluador
        run: |
          # 1. Ejecutar y mostrar tabla en el log
          java -cp out core.Main secretos/data/private | tee resultado.txt
          
          # 2. Extraer la nota (ejemplo: 37.12)
          SCORE=$(grep "PUNTUACIÓN MEDIA FINAL:" resultado.txt | cut -d':' -f2 | cut -d'/' -f1 | xargs)
          if [ -z "$SCORE" ]; then SCORE=0; fi
          
          # 3. Formatear la salida como JSON que Classroom pueda leer
          # Esto evita el error del reporter porque generamos el formato exacto
          echo "::set-output name=result::{\"stats\":{\"tests\":1,\"passes\":1,\"failures\":0,\"pending\":0,\"suites\":1,\"duration\":1},\"tests\":[{\"fullTitle\":\"Evaluacion de Eficiencia\",\"title\":\"Eficiencia\",\"duration\":1,\"err\":{},\"status\":\"passed\",\"speed\":\"fast\",\"score\":$SCORE}]}"

      - name: Autograding Reporter
        uses: education/autograding-grading-reporter@v1
        env:
          EVALUACION_RESULTS: "${{ steps.evaluador.outputs.result }}"
        with:
          runners: evaluacion