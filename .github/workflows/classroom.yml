name: Autograding
on: [push]

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout alumno
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compilar
        run: javac -d out src/core/*.java src/solution/*.java

      - name: Descargar tests privados
        env:
          TOKEN: ${{ secrets.MY_PRIVATE_TOKEN }}
        run: |
          git clone https://x-access-token:$TOKEN@github.com/DAM-IES-La-Arboleda/bin-packing-private-tests.git secretos

      - name: Ejecutar evaluación
        id: run
        run: |
          output=$(java -cp out core.Main secretos/data/private)
          echo "$output"

          score=$(echo "$output" | grep "FINAL_SCORE=" | cut -d '=' -f2 | xargs)

          if [ -z "$score" ]; then
            echo "❌ No se pudo extraer el score"
            exit 1
          fi

          echo "SCORE=$score" >> $GITHUB_ENV

      # 🔥 NUEVO PASO: actualizar leaderboard central
      - name: Actualizar leaderboard central
        if: success()
        env:
          TOKEN: ${{ secrets.LEADERBOARD_TOKEN }}
        run: |
          USER="${{ github.actor }}"
          SCORE="${{ env.SCORE }}"

          echo "Usuario: $USER"
          echo "Score: $SCORE"

          # Obtener JSON actual
          content=$(curl -s -H "Authorization: Bearer $TOKEN" \
            https://api.github.com/repos/DAM-IES-La-Arboleda/bin-packing-template/contents/leaderboard.json)

          sha=$(echo "$content" | jq -r '.sha')

          # actualizar leaderboard localmente
          echo "$content" | jq -r '.content' | base64 -d > leaderboard.json

          jq --arg user "$USER" --argjson score "$SCORE" \
            '.[$user] = ([$score, (.[$user] // 0)] | max)' leaderboard.json > tmp.json

          encoded=$(base64 -w 0 tmp.json)

          # subir al repo central
          curl -X PUT \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            https://api.github.com/repos/DAM-IES-La-Arboleda/bin-packing-template/contents/leaderboard.json \
            -d "{
              \"message\": \"update leaderboard from $USER\",
              \"content\": \"$encoded\",
              \"sha\": \"$sha\"
            }"