name: Autograding
on: [push]

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout alumno
        uses: actions/checkout@v3

      - name: Configurar Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compilar
        run: javac -d out src/core/*.java src/solution/*.java

      - name: Descargar tests privados
        env:
          TOKEN: ${{ secrets.MY_PRIVATE_TOKEN }}
        run: |
          git clone https://x-access-token:$TOKEN@github.com/DAM-IES-LaArboleda/bin-packing-private-tests.git secretos

      - name: Ejecutar evaluación
        id: run
        run: |
          output=$(java -cp out core.Main secretos/data/private)
          echo "$output"

          # Extraer score (formato robusto recomendado)
          score=$(echo "$output" | grep "FINAL_SCORE=" | cut -d '=' -f2)

          # Validación básica
          if [ -z "$score" ]; then
            echo "❌ No se pudo extraer el score"
            exit 1
          fi

          score_int=$(printf "%.0f" $score)

          echo "Score final: $score_int"

          echo "SCORE=$score_int" >> $GITHUB_ENV

      - name: Actualizar leaderboard
        env:
          TOKEN: ${{ secrets.MY_PRIVATE_TOKEN }}
        run: |
          alumno=${{ github.actor }}

          echo "Alumno: $alumno"
          echo "Score: $SCORE"

          git clone https://x-access-token:$TOKEN@github.com/DAM-IES-La-Arboleda/bin-packing-template.git central
          cd central

          sudo apt-get update -y
          sudo apt-get install -y jq

          # Crear leaderboard si no existe
          if [ ! -f leaderboard.json ]; then
            echo "{}" > leaderboard.json
          fi

          # Actualizar score
          jq --arg alumno "$alumno" --argjson score $SCORE \
             '.[$alumno] = $score' leaderboard.json > tmp.json && mv tmp.json leaderboard.json

          # Config git
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          git add leaderboard.json
          git commit -m "Update $alumno score to $SCORE" || echo "No changes"

          # Evitar conflictos
          git pull --rebase
          git push