name: Leaderboard Updater
on:
  repository_dispatch:
    types: [update_leaderboard]

jobs:
  update-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Template
        uses: actions/checkout@v4
        with:
          # Usamos tu token privado para asegurar permisos de escritura
          token: ${{ secrets.MY_PRIVATE_TOKEN }}

      - name: Actualizar JSON
        run: |
          USER="${{ github.event.client_payload.user }}"
          SCORE="${{ github.event.client_payload.score }}"
          
          # Crear archivo si no existe
          if [ ! -f leaderboard.json ]; then echo "{}" > leaderboard.json; fi

          # Actualizar nota: solo guarda la nueva si es mejor que la anterior
          sudo apt-get update && sudo apt-get install -y jq
          jq --arg u "$USER" --argjson s "$SCORE" \
          '.[$u] = (if (.[$u] // 0) < $s then $s else .[$u] end)' \
          leaderboard.json > tmp.json && mv tmp.json leaderboard.json

      - name: Guardar Cambios (Push Seguro)
        env:
          TOKEN: ${{ secrets.MY_PRIVATE_TOKEN }}
        run: |
          git config user.name "Leaderboard Bot"
          git config user.email "actions@github.com"
          
          # Re-configuramos el remoto para usar el token privado y evitar el error 403
          git remote set-url origin https://x-access-token:${TOKEN}@github.com/DAM-IES-La-Arboleda/bin-packing-template.git
          
          git add leaderboard.json
          # El [skip ci] evita bucles infinitos
          git commit -m "Score update: ${{ github.event.client_payload.user }} [skip ci]" || echo "No changes"
          git push origin main