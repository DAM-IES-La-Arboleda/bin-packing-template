name: Leaderboard Updater
on:
  repository_dispatch:
    types: [update_leaderboard]

jobs:
  update-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Template
        uses: actions/checkout@v4

      - name: Actualizar JSON
        run: |
          USER="${{ github.event.client_payload.user }}"
          SCORE="${{ github.event.client_payload.score }}"
          
          echo "Actualizando ranking para $USER con nota $SCORE"

          # Crear el archivo si no existe por algún motivo
          if [ ! -f leaderboard.json ]; then echo "{}" > leaderboard.json; fi

          # Actualizar nota: solo guarda la nueva si es mejor que la anterior (High Score)
          jq --arg u "$USER" --argjson s "$SCORE" \
          '.[$u] = (if (.[$u] // 0) < $s then $s else .[$u] end)' \
          leaderboard.json > tmp.json && mv tmp.json leaderboard.json

      - name: Guardar Cambios
        run: |
          git config user.name "Leaderboard Bot"
          git config user.email "actions@github.com"
          git add leaderboard.json
          git commit -m "Score update: ${{ github.event.client_payload.user }}"
          git push