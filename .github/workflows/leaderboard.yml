name: Update Leaderboard from Dispatch

on:
  repository_dispatch:
    types: [update_leaderboard]

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Instalar jq
        run: sudo apt-get install -y jq

      - name: Actualizar leaderboard
        run: |
          USER="${{ github.event.client_payload.user }}"
          SCORE="${{ github.event.client_payload.score }}"

          echo "Usuario: $USER"
          echo "Score: $SCORE"

          if [ ! -f leaderboard.json ]; then
            echo "{}" > leaderboard.json
          fi

          jq --arg user "$USER" --argjson score "$SCORE" \
            '.[$user] = ($score | tonumber)' leaderboard.json > tmp.json && mv tmp.json leaderboard.json

      - name: Commit cambios
        env:
          TOKEN: ${{ secrets.MY_PRIVATE_TOKEN }}
      run: |
        USER="${{ github.event.client_payload.user }}"
        SCORE="${{ github.event.client_payload.score }}"

        echo "Usuario: $USER"
        echo "Score: $SCORE"

        # Obtener contenido actual
        content=$(curl -s -H "Authorization: Bearer $TOKEN" \
          https://api.github.com/repos/DAM-IES-La-Arboleda/bin-packing-template/contents/leaderboard.json)

        sha=$(echo $content | jq -r '.sha')
        encoded=$(echo '{"'${USER}'":'${SCORE}'}' | base64 -w 0)

        curl -X PUT \
          -H "Authorization: Bearer $TOKEN" \
          -H "Content-Type: application/json" \
          https://api.github.com/repos/DAM-IES-La-Arboleda/bin-packing-template/contents/leaderboard.json \
          -d "{
            \"message\": \"update leaderboard\",
            \"content\": \"$encoded\",
            \"sha\": \"$sha\"
          }"